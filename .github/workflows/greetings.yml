name: Greeting

on: [pull_request_target, issues]

jobs:
    greeting:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/first-interaction@v3
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  issue-message:
                      "Welcome to the project! Thank you for opening your first
                      issue. We will review it shortly."
                  pr-message:
                      "Welcome to the project! Thank you for your first Pull
                      Request. We'll review your changes as soon as possible."
